name: FAC Audit Alert

on:
  workflow_dispatch:         # triggered by cron-job.org every hour, or manually via GitHub UI

permissions:
  contents: write            # needed to commit last_check.json back to repo

jobs:
  check-audits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run FAC alert
        env:
          FAC_API_KEY: ${{ secrets.FAC_API_KEY }}
          WATCH_STATE: ${{ secrets.WATCH_STATE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          STATE_FILE: last_check.json
        run: python fac_alert.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_check.json
          git diff --staged --quiet || git commit -m "state: update seen report IDs $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
